<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Countdown</title>
    <style>
        /* 全黑背景，極簡純白風格 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        /* 純白色倒數文字 */
        #timer {
            font-size: 5rem;
            font-weight: 300; /* 較細的字體看起來更有質感 */
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        /* Click me 按鈕 */
        #gift-btn {
            display: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #ffffff; /* 白色邊框 */
            border-radius: 4px; /* 微圓角 */
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #gift-btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        @media (max-width: 600px) {
            #timer { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div>
        <div id="countdown-ui">
            <div id="timer">00:00:00</div>
        </div>
        
        <button id="gift-btn" onclick="location.href='https://youtu.be/n5h1ijjV-Sc?si=tFSji8U_an91nisG'">Click me</button>
    </div>

    <script>
        // --- 設定目標日期 (請修改這裡) ---
        // 範例：2026-03-25 00:00:00
        const targetDate = new Date("2026-03-24 14:20:00").getTime();

        const timerEl = document.getElementById('timer');
        const countdownBox = document.getElementById('countdown-ui');
        const giftBtn = document.getElementById('gift-btn');

        const interval = setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                clearInterval(interval);
                countdownBox.style.display = 'none';
                giftBtn.style.display = 'inline-block';
                return;
            }

            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);

            timerEl.innerText = 
                h.toString().padStart(2, '0') + ":" + 
                m.toString().padStart(2, '0') + ":" + 
                s.toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
