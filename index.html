<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝟘𝟛𝟚𝟠</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; 
            background: radial-gradient(circle at 50% 50%, #151515 0%, #000 80%);
            color: #fff;
            font-family: 'Cormorant Garamond', serif; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; scroll-behavior: smooth;
            transition: background 1.5s ease;
        }

        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* --- 1. 倒數主畫面 --- */
        #countdown-section { display: flex; flex-direction: column; align-items: center; transition: all 1.5s ease; z-index: 10; }
        #countdown-ui { display: flex; gap: 25px; align-items: center; transition: transform 0.2s; }
        .time-group { text-align: center; }
        .time-part { 
            font-family: 'Playfair Display', serif; font-size: 3.5rem; 
            font-weight: 400; font-style: italic; letter-spacing: -1px; line-height: 1;
            text-shadow: 0 0 30px rgba(255,255,255,0.25); 
        }
        .label { display: block; font-family: 'Montserrat', sans-serif; font-size: 0.6rem; color: #555; text-transform: uppercase; margin-top: 10px; letter-spacing: 4px; }

        /* 最後十秒激發態 */
        .critical-hit { color: #fff !important; text-shadow: 0 0 40px #fff !important; transform: scale(1.2); transition: 0.2s; }
        @keyframes bg-pulse-red { 0% { background: #000; } 100% { background: #200; } }
        .body-critical { animation: bg-pulse-red 0.5s infinite alternate; }

        /* --- 轉場層 (3秒白光 + 5秒文字) --- */
        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999; opacity: 0; display: none;
            justify-content: center; align-items: center; transition: opacity 2s ease, background 2s ease;
        }
        #hb-text { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-style: italic; letter-spacing: 12px; color: #fff; opacity: 0; }
        @keyframes breathe { 0%, 100% { opacity: 0.2; filter: blur(2px); } 50% { opacity: 1; filter: blur(0px); } }
        .breathe-animation { animation: breathe 2.5s infinite ease-in-out; }

        /* --- 2. 登入層 --- */
        #login-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; flex-direction: column;
            justify-content: center; align-items: center; opacity: 0; transition: opacity 1s ease;
        }
        .login-box { text-align: center; width: 85%; max-width: 300px; z-index: 1001; }
        .input-group { margin-bottom: 25px; text-align: left; }
        .login-label { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; letter-spacing: 3px; color: #555; margin-bottom: 8px; display: block; text-transform: uppercase; }
        .login-input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; font-family: 'Playfair Display', serif; font-size: 1.1rem; width: 100%; outline: none; padding: 8px 0; letter-spacing: 2px; transition: border-color 0.5s; }
        .login-input:focus { border-color: #fff; }
        .error-msg { color: #ff4d4d; font-size: 0.75rem; margin-top: 15px; height: 20px; opacity: 0; transition: opacity 0.3s; font-family: 'Montserrat', sans-serif; }
        .login-btn { margin-top: 30px; padding: 15px; width: 100%; background: transparent; border: 1px solid #333; color: #fff; font-family: 'Montserrat', sans-serif; font-size: 0.7rem; letter-spacing: 4px; cursor: pointer; transition: all 0.5s; text-transform: uppercase; }
        .login-btn:hover { background: #fff; color: #000; border-color: #fff; }

        /* --- 3. 藝廊與相框設計 --- */
        #gallery-section { display: none; width: 100%; text-align: center; padding-bottom: 100px; height: 100vh; overflow-y: auto; z-index: 10; position: relative; }
        .grid { display: flex; flex-direction: column; align-items: center; gap: 60px; margin-top: 60px; perspective: 2000px; }
        
        .card-container { 
            width: 240px; height: 426px; position: relative; 
            transform-style: preserve-3d; transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 1.5s ease; 
            cursor: pointer; opacity: 0; transform: translateY(40px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        .card-container.show { opacity: 1; transform: translateY(0); }
        .card-container.flipped { transform: rotateY(180deg); cursor: default; }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.08); }
        .card-front { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(5px); color: #444; font-family: 'Playfair Display', serif; font-size: 2rem; font-style: italic; }
        
        /* 設計感背框 */
        .card-back { 
            background: #000; transform: rotateY(180deg); overflow: hidden; 
            padding: 10px; border: 1px solid #222; box-sizing: border-box;
            position: relative;
        }
        .card-back::before {
            content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px solid rgba(218, 165, 32, 0.2); pointer-events: none;
        }

        .card-back img { width: 100%; height: 100%; object-fit: cover; }
        .special .card-front { background: #fff; color: #000; border: none; font-weight: 700; box-shadow: 0 0 25px rgba(255,255,255,0.3); }

        /* --- 4. 載入畫面 --- */
        #loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 3000; flex-direction: column; justify-content: center;
            align-items: center; opacity: 0; transition: opacity 2s ease;
        }
        .loading-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem; letter-spacing: 2px; color: #fff; margin-bottom: 20px; }
        .loader-bar { width: 150px; height: 1px; background: #222; position: relative; overflow: hidden; }
        .loader-bar::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: #fff; animation: loading 3s infinite; }
        
        @keyframes loading { 0% { left: -100%; } 50% { left: 0; } 100% { left: 100%; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @media (max-width: 600px) { .time-part { font-size: 2.8rem; } .card-container { width: 210px; height: 373px; } }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div id="countdown-section">
        <div style="font-family:'Montserrat'; font-size:0.6rem; letter-spacing:8px; color:#333; margin-bottom:40px;">CHRONICLES</div>
        <div id="countdown-ui">
            <div class="time-group"><span id="days" class="time-part">00</span><span class="label">days</span></div>
            <div class="time-group"><span id="hours" class="time-part">00</span><span class="label">hours</span></div>
            <div class="time-group"><span id="minutes" class="time-part">00</span><span class="label">mins</span></div>
            <div class="time-group"><span id="seconds" class="time-part">00</span><span class="label">secs</span></div>
        </div>
    </div>

    <div id="transition-overlay">
        <div id="hb-text">Happy Birthday!</div>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <div class="input-group">
                <span class="login-label">Username</span>
                <input type="text" id="user-input" class="login-input" autocomplete="off">
            </div>
            <div class="input-group">
                <span class="login-label">Password</span>
                <input type="password" id="pass-input" class="login-input">
            </div>
            <div id="error-display" class="error-msg">Incorrect credentials.</div>
            <button class="login-btn" onclick="handleLogin()">Login</button>
        </div>
    </div>

    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <div id="music-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:2000; justify-content:center; align-items:center; opacity:0; transition:opacity 1.2s ease; text-align:center;">
        <div class="modal-content">
            <div style="font-family:'Playfair Display'; font-style:italic; font-size:2.2rem; margin-bottom:20px; color:#fff;">Welcome! Zoe.</div>
            <div style="color:#777; margin-bottom:40px; font-size:0.9rem; letter-spacing:1px; line-height:2;">The chronicles are unlocked.<br>Please turn on the audio to begin.</div>
            <button class="music-btn" style="padding:18px; width:280px; background:none; border:1px solid #333; color:#fff; cursor:pointer; letter-spacing:4px;" onclick="startWithMusic()">[ Start Experience ]</button>
        </div>
    </div>

    <div id="gallery-section">
        <div style="font-family: 'Playfair Display'; font-style: italic; color: #444; letter-spacing: 8px; font-size: 0.8rem; margin-top: 60px;">Archive 0328</div>
        <div class="grid" id="card-grid"></div>
    </div>

    <div id="loading-overlay">
        <div class="loading-text">Loading the newest chapter...</div>
        <div class="loader-bar"></div>
    </div>

    <script>
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, snowflakes = [];
        function initSnow() { resize(); for (let i = 0; i < 150; i++) snowflakes.push(new Snowflake()); animate(); }
        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize);
        class Snowflake {
            constructor() { this.reset(); }
            reset() { this.x = Math.random() * width; this.y = Math.random() * height; this.size = Math.random() * 2 + 1; this.speedY = Math.random() * 1 + 0.5; this.speedX = Math.random() * 0.5 - 0.25; this.opacity = Math.random() * 0.5 + 0.2; }
            update() { this.y += this.speedY; this.x += this.speedX; if (this.y > height) { this.y = -10; this.x = Math.random() * width; } }
            draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        function animate() { ctx.clearRect(0, 0, width, height); snowflakes.forEach(flake => { flake.update(); flake.draw(); }); requestAnimationFrame(animate); }
        initSnow();

        // 核心計時
        const targetDate = new Date("2026-03-28T00:00:00+08:00").getTime();
        let criticalTriggered = false;

        const interval = setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff <= 0) {
                clearInterval(interval);
                triggerBirthdayTransition();
            } else {
                const s = Math.floor((diff / 1000) % 60);
                document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById('hours').innerText = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
                document.getElementById('minutes').innerText = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
                document.getElementById('seconds').innerText = s.toString().padStart(2, '0');

                if (diff <= 10000) {
                    if(!criticalTriggered) { criticalTriggered = true; document.body.classList.add('body-critical'); }
                    const sec = document.getElementById('seconds');
                    sec.classList.add('critical-hit');
                    setTimeout(() => sec.classList.remove('critical-hit'), 500);
                    document.getElementById('countdown-ui').style.transform = `scale(${1 + (10-s)*0.02})`;
                }
            }
        }, 1000);

        function triggerBirthdayTransition() {
            document.body.classList.remove('body-critical');
            document.body.style.background = "#000";
            const overlay = document.getElementById('transition-overlay');
            const hbText = document.getElementById('hb-text');
            const countdown = document.getElementById('countdown-section');

            overlay.style.display = 'flex';
            setTimeout(() => { 
                overlay.style.opacity = '1'; 
                countdown.style.display = 'none';
            }, 50);

            setTimeout(() => {
                overlay.style.background = '#000';
                hbText.classList.add('breathe-animation');
                setTimeout(() => {
                    hbText.style.transition = 'all 2s ease';
                    hbText.style.opacity = '0';
                    setTimeout(() => {
                        overlay.style.opacity = '0';
                        setTimeout(() => {
                            overlay.style.display = 'none';
                            showLogin();
                        }, 1000);
                    }, 2000);
                }, 5000);
            }, 3000);
        }

        function showLogin() {
            const login = document.getElementById('login-overlay');
            login.style.display = 'flex';
            setTimeout(() => login.style.opacity = '1', 100);
        }

        function handleLogin() {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;
            if (user === "Zoe" && pass === "0328") {
                const login = document.getElementById('login-overlay');
                login.style.opacity = '0';
                setTimeout(() => { login.style.display = 'none'; showMusicModal(); }, 1000);
            } else {
                document.getElementById('error-display').style.opacity = '1';
                document.querySelector('.login-box').style.animation = 'shake 0.4s';
                setTimeout(() => document.querySelector('.login-box').style.animation = '', 400);
            }
        }

        function showMusicModal() {
            const modal = document.getElementById('music-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.style.opacity = '1', 100);
        }

        function startWithMusic() {
            document.getElementById('bg-music').play();
            const modal = document.getElementById('music-modal');
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
                document.getElementById('gallery-section').style.display = 'block';
                setTimeout(addCard, 800);
            }, 1000);
        }

        const years = ['2020', '2021', '2022', '2023', '2024', '2025', '2026'];
        let currentIdx = 0;

        function addCard() {
            if (currentIdx >= years.length) return;
            const year = years[currentIdx];
            const grid = document.getElementById('card-grid');
            const container = document.createElement('div');
            container.className = 'card-container' + (year === '2026' ? ' special' : '');
            container.innerHTML = `
                <div class="card-face card-front"><span>${year}</span></div>
                <div class="card-face card-back">
                    ${year === '2026' ? '<span style="color:#fff; font-family:\'Playfair Display\'; font-style:italic;">GET READY!</span>' : `<img src="${year}.jpg">`}
                </div>
            `;
            container.onclick = function() {
                if (this.classList.contains('flipped')) return;
                this.classList.add('flipped');
                
                if (year === '2026') {
                    const loading = document.getElementById('loading-overlay');
                    loading.style.display = 'flex';
                    setTimeout(() => loading.style.opacity = '1', 100);
                    
                    // --- 高級絲滑淡出邏輯 ---
                    const audio = document.getElementById('bg-music');
                    const fadeOutTime = 3800; // 在 3.8 秒內漸漸消失
                    const stepTime = 50;      // 每 0.05 秒微調一次音量，消除階梯感
                    const currentVol = audio.volume;
                    const volumeStep = currentVol / (fadeOutTime / stepTime);

                    const fadeEffect = setInterval(() => {
                        if (audio.volume > volumeStep) {
                            audio.volume -= volumeStep;
                        } else {
                            audio.volume = 0;
                            audio.pause();
                            clearInterval(fadeEffect);
                        }
                    }, stepTime);
                    // -----------------------
                    
                    setTimeout(() => { 
                        window.location.href = 'https://youtu.be/NG8ZhM0lR0c'; 
                    }, 4000); 
                    return;
                }
                currentIdx++;
                setTimeout(addCard, 3500);
            };
            grid.appendChild(container);
            setTimeout(() => container.classList.add('show'), 100);
            container.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
