<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝟘𝟛𝟚𝟠</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            text-align: center;
            overflow: hidden;
        }
        
        #countdown-ui {
            display: flex; gap: 20px; justify-content: center; align-items: baseline;
        }

        .time-part { font-size: 3.5rem; font-weight: 300; letter-spacing: 2px; }
        .label { font-size: 0.8rem; font-weight: 400; color: #666; margin-left: 5px; text-transform: uppercase; }

        #login-section { display: none; width: 280px; }
        .input-group { margin-bottom: 25px; text-align: left; }
        input {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid #ffffff;
            color: #ffffff; font-size: 1rem; padding: 10px 0; outline: none;
            font-family: 'Montserrat', sans-serif; letter-spacing: 1px;
        }
        .hint { font-size: 0.65rem; color: #555; margin-top: 5px; letter-spacing: 1px; text-transform: uppercase; }
        
        .btn {
            padding: 15px 40px; font-size: 0.9rem; background-color: transparent; color: #ffffff;
            border: 1px solid #ffffff; border-radius: 2px; cursor: pointer;
            transition: all 0.3s ease; letter-spacing: 3px; text-transform: uppercase; width: 100%; margin-top: 10px;
        }
        .btn:hover { background-color: #ffffff; color: #000000; }
        
        #gift-btn { display: none; }
        #error-msg { color: #ff4b2b; font-size: 0.75rem; margin-bottom: 15px; height: 1rem; display: none; }

        @media (max-width: 600px) {
            #countdown-ui { gap: 10px; }
            .time-part { font-size: 1.8rem; }
            .label { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <div>
        <div id="countdown-ui">
            <div><span id="days" class="time-part">00</span><span class="label">Days</span></div>
            <div><span id="hours" class="time-part">00</span><span class="label">HRs</span></div>
            <div><span id="minutes" class="time-part">00</span><span class="label">MINs</span></div>
            <div><span id="seconds" class="time-part">00</span><span class="label">SECs</span></div>
        </div>

        <div id="login-section">
            <div id="error-msg">Incorrect password, please try again.</div>
            <div id="input-container">
                <div class="input-group">
                    <input type="text" id="username" placeholder="USERNAME" spellcheck="false" autocomplete="off">
                    <div class="hint">English name</div>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="PASSWORD" autocomplete="off">
                    <div class="hint">Your birthday date</div>
                </div>
                <button class="btn" onclick="checkLogin()">Login</button>
            </div>
            <button id="gift-btn" class="btn" onclick="location.href='https://youtu.be/n5h1ijjV-Sc?si=tFSji8U_an91nisG'">Click me</button>
        </div>
    </div>

    <script>
        // 設定目標：2026年3月28日 00:00 台北時間 (GMT+8)
        const targetDate = new Date("2026-03-28T00:00:00+08:00").getTime();

        const countdownBox = document.getElementById('countdown-ui');
        const loginSection = document.getElementById('login-section');
        const inputContainer = document.getElementById('input-container');
        const giftBtn = document.getElementById('gift-btn');
        const errorMsg = document.getElementById('error-msg');

        const interval = setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                clearInterval(interval);
                countdownBox.style.display = 'none';
                loginSection.style.display = 'block';
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);

            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }, 1000);

        function checkLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            // 帳密：Zoe / 0328
            if (user.toLowerCase() === "zoe" && pass === "0328") {
                errorMsg.style.display = 'none';
                inputContainer.style.display = 'none';
                giftBtn.style.display = 'block';
            } else {
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
